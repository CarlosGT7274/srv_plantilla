---
# ansible/roles/databases/tasks/main.yml
- name: Get deploy user info
  user:
    name: "{{ deploy_user }}"
  register: deploy_user_info

- name: Create database directories
  file:
    path: "{{ databases_dir }}/{{ item.name }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0755'
  loop: "{{ managed_databases }}"

- name: Deploy Database Quadlets
  template:
    src: db.container.j2
    dest: "/home/{{ deploy_user }}/.config/containers/systemd/{{ item.name }}.container"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0644'
  loop: "{{ managed_databases }}"
  notify: Reload systemd user

- name: Ensure databases are started and enabled
  systemd:
    name: "{{ item.name }}"
    scope: user
    state: started
    enabled: yes
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ deploy_user_info.uid }}"
  loop: "{{ managed_databases }}"

- name: Configure firewalld for database access
  firewalld:
    port: "{{ item.0.port }}/tcp"
    source: "{{ item.1 }}"
    permanent: yes
    state: enabled
    immediate: yes
  loop: "{{ managed_databases | subelements('whitelist_ips', skip_missing=True) }}"
  when: item.0.external_access | default(false)
