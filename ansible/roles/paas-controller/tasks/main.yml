---
- name: Install build tools on host
  dnf:
    name:
      - nodejs
      - npm
      - git
      - buildah
    state: present
  become: yes

- name: Get deploy user info
  user:
    name: "{{ deploy_user }}"
  register: deploy_user_info

- name: Install pack CLI
  shell: |
    curl -sSL "https://github.com/buildpacks/pack/releases/download/v0.35.1/pack-v0.35.1-linux.tgz" | tar -C /usr/local/bin/ --no-same-owner -xzv pack
  args:
    creates: /usr/local/bin/pack
  become: yes

- name: Sync Controller source (including Dockerfile)
  synchronize:
    src: "../../../../controller/"
    dest: "{{ controller_dir }}/"
    recursive: yes
    delete: yes
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=dist"
      - "--exclude=builds"
      - "--exclude=config"

- name: Create controller directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0755'
  loop:
    - "{{ controller_dir }}"
    - "{{ controller_dir }}/builds"
    - "{{ controller_dir }}/config"

- name: Template Controller app config
  template:
    src: config.json.j2
    dest: "{{ controller_dir }}/config/apps.json"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0644'

- name: Build paas-controller image with Podman
  command: >
    podman build
    -t localhost/paas-controller:latest
    {{ controller_dir }}
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ deploy_user_info.uid }}"

- name: Remove old controller.service if exists (migrating to Quadlet)
  file:
    path: "/home/{{ deploy_user }}/.config/systemd/user/paas-controller.service"
    state: absent

- name: Deploy Controller Quadlet
  template:
    src: controller.container.j2
    dest: "/home/{{ deploy_user }}/.config/containers/systemd/paas-controller.container"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0644'
  notify: Reload systemd user

- name: Flush handlers
  meta: flush_handlers

- name: Ensure Controller is started and enabled
  systemd:
    name: paas-controller.service
    scope: user
    state: restarted
    enabled: yes
    daemon_reload: yes
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ deploy_user_info.uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ deploy_user_info.uid }}/bus"
