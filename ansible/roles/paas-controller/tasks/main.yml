---
# ansible/roles/paas-controller/tasks/main.yml
#
# El rol se divide en dos etapas:
#
#   bootstrap.yml — cosas que solo importan una vez por servidor: paquetes del
#                   sistema, pack CLI, directorios base, config vacía inicial.
#                   Ya son idempotentes por diseño (dnf state:present, creates:),
#                   pero moverlas aquí permite EXCLUIRLAS explícitamente en
#                   iteración con --tags paas-controller-deploy, en vez de
#                   depender de que Ansible las note como "no-op" cada vez.
#
#   deploy.yml    — lo que sí cambia en cada iteración: sync de código,
#                   rebuild condicional de la imagen (solo si el código
#                   realmente cambió), Quadlet, y restart vía handler (no
#                   forzado).
#
# Uso:
#   ansible-playbook site.yml --tags paas-controller            # todo (prod, sin cambios de comportamiento)
#   ansible-playbook site.yml --tags paas-controller-bootstrap  # solo una vez / tras cambiar deps del host
#   ansible-playbook site.yml --tags paas-controller-deploy     # iteración rápida: solo código -> rebuild/restart

- name: Get deploy user info
  user:
    name: "{{ deploy_user }}"
  register: deploy_user_info
  tags: always

- name: Bootstrap host dependencies (una sola vez)
  import_tasks: bootstrap.yml
  tags:
    - paas-controller
    - paas-controller-bootstrap

- name: Deploy controller (cada cambio)
  import_tasks: deploy.yml
  tags:
    - paas-controller
    - paas-controller-deploy
