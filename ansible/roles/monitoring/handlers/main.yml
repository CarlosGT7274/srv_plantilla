---
# ansible/roles/monitoring/handlers/main.yml
- name: Reload systemd user
  systemd:
    daemon_reload: yes
    scope: user
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ deploy_user_info.uid }}"

- name: Restart monitoring services
  systemd:
    name: "{{ item }}.service"
    scope: user
    state: restarted
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ deploy_user_info.uid }}"
  loop:
    - prometheus
    - grafana
    - alertmanager
    - node-exporter
    - podman-exporter
